name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install all dependencies
        run: pnpm install
        working-directory: src

      - name: Build libraries
        run: pnpm run build
        working-directory: src

      - name: Build Angular frontend
        run: pnpm --filter angular run build
        working-directory: src

      - name: Build Electron app
        run: pnpm --filter impi run build
        working-directory: src

      - name: Build & publish — Linux
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish onTagOrDraft
        working-directory: src/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish — Windows
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish onTagOrDraft
        working-directory: src/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish — macOS
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish onTagOrDraft
        working-directory: src/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
