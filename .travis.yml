language: node_js
node_js: "22"
env:
  global:
    - ELECTRON_CACHE=$HOME/.cache/electron
    - ELECTRON_BUILDER_CACHE=$HOME/.cache/electron-builder
    - USE_HARD_LINKS=false

cache:
  directories:
    - src/libs/node_modules
    - src/apps/angular/node_modules
    - src/electron/node_modules
    - $HOME/.cache/electron
    - $HOME/.cache/electron-builder

git:
  depth: 1

install:
  - npm install -g pnpm@10
  # Install and build libs
  - cd src/libs && pnpm install && pnpm run build
  # Install Angular app
  - cd ../apps/angular && pnpm install
  # Install CLI
  - cd ../../cli && pnpm install
  # Install Electron
  - cd ../electron && pnpm install

script:
  # Test libs
  - cd $TRAVIS_BUILD_DIR/src/libs && pnpm run test
  # Build Angular
  - cd $TRAVIS_BUILD_DIR/src/apps/angular && pnpm run build
  # Build CLI
  - cd $TRAVIS_BUILD_DIR/src/cli && pnpm run build
  - npx @yao-pkg/pkg . --targets node22-linux-x64
  # Build Electron
  - cd $TRAVIS_BUILD_DIR/src/electron && pnpm run build && pnpm run release

before_deploy:
  - export TRAVIS_TAG=v$(node -pe "require('$TRAVIS_BUILD_DIR/src/cli/package.json').version")
  - cd $TRAVIS_BUILD_DIR
  - tar -zcf impi-cli-$TRAVIS_TAG.tar.gz -C ./src/cli impi-cli

deploy:
  provider: releases
  api_key:
    secure: 
  file: impi-cli-$TRAVIS_TAG.tar.gz
  draft: true
  on:
    repo: bfs-preis/impi
  skip_cleanup: true
  overwrite: true
