<div class="db-selector-container">
	<mat-card>
		<mat-card-header>
			<h3>{{ "anonymizer.Db.Title" | translate }}</h3>
		</mat-card-header>
		<mat-card-content>
			<!-- File Picker -->
			<app-file-picker
				[label]="'anonymizer.Db.File' | translate"
				[buttonText]="'anonymizer.Db.SelectFile' | translate"
				[filters]="filters"
				[mode]="'file'"
				[disabled]="disabled"
				[selectedPath]="file"
				(fileSelected)="onFileSelected($event)"
			>
			</app-file-picker>

			<!-- Loading Spinner -->
			@if (isValidating) {
				<div class="validation-spinner">
					<ob-spinner></ob-spinner>
					<span>Validating database...</span>
				</div>
			}

			<!-- Error Message -->
			@if (error && !isValidating) {
				<div class="alert alert-danger" role="alert">
					<mat-icon svgIcon="exclamation_circle"></mat-icon>
					<span>{{ error }}</span>
				</div>
			}

			<!-- Database Info -->
			@if (isValidFile && dbInfo && !isValidating) {
				<div class="db-info">
					<div class="info-row">
						<label>{{ "anonymizer.Db.Version" | translate }}</label>
						<span class="badge bg-primary">{{ getVersion() }}</span>
					</div>
					<div class="info-row">
						<label>{{ "anonymizer.Db.Period" | translate }}</label>
						<span class="badge bg-info">{{ getPeriod() }}</span>
					</div>
					<div class="info-row">
						<button type="button" mat-button obButton="secondary" [matTooltip]="getKFactorTooltip()" (click)="openKFactorDialog()">
							<mat-icon svgIcon="checkmark_circle"></mat-icon>
							{{ "anonymizer.Db.KFactor" | translate }}
						</button>
					</div>
				</div>
			}

			<!-- Validation Status Icon -->
			@if (!isValidating) {
				<div class="validation-status">
					@if (isValidFile) {
						<mat-icon svgIcon="checkmark_circle" class="text-success"> </mat-icon>
					}
					@if (!isValidFile && file) {
						<mat-icon svgIcon="exclamation_circle" class="text-danger"> </mat-icon>
					}
				</div>
			}
		</mat-card-content>
	</mat-card>
</div>
